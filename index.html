<!DOCTYPE html>
<html>
<head>
<title>Subscription Killer MVP</title>
<style>
body {
font-family: Arial;
max-width: 500px;
margin: auto;
padding: 20px;
background: #f5f5f5;
}
h1 {
text-align: center;
}
input, button {
padding: 10px;
margin: 5px 0;
width: 100%;
}
.card {
background: white;
padding: 10px;
margin-top: 10px;
border-radius: 8px;
display: flex;
justify-content: space-between;
}
.total {
margin-top: 20px;
font-weight: bold;
}
button {
cursor: pointer;
}
</style>
</head>
<body>
<h1>💸 Subscription Killer</h1>
<input id="name" placeholder="Subscription name (e.g. Netflix)" />
<input id="price" type="number" placeholder="Monthly price (£)" />
<button onclick="addSub()">Add Subscription</button>
<div id="list"></div>
<div class="total" id="total"></div>
<script>
let subs = JSON.parse(localStorage.getItem("subs")) || [];
function save() {
localStorage.setItem("subs", JSON.stringify(subs));
}
function addSub() {
const name = document.getElementById("name").value;
const price = parseFloat(document.getElementById("price").value);
if (!name || !price) return alert("Fill all fields");
subs.push({ name, price });
save();
render();
document.getElementById("name").value = "";
document.getElementById("price").value = "";
}
function deleteSub(index) {
subs.splice(index, 1);
save();
render();
}
function render() {
const list = document.getElementById("list");
list.innerHTML = "";
let total = 0;
subs.forEach((sub, i) => {
total += sub.price;
list.innerHTML +=       <div class="card">         <div>           <strong>${sub.name}</strong><br>           £${sub.price}/month         </div>         <button onclick="deleteSub(${i})">❌</button>       </div>    ;
});
document.getElementById("total").innerHTML =
Monthly: £${total.toFixed(2)} <br> Yearly: £${(total * 12).toFixed(2)};
}
render();
</script>
</body>
</html>
